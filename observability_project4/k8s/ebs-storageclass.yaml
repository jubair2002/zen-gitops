# StorageClass: gp3-ebs-csi
#
# Uses the AWS EBS CSI driver (ebs.csi.aws.com) to dynamically provision
# gp3 EBS volumes. gp3 delivers 3000 IOPS / 125 MB-s baseline at no extra
# cost vs gp2 and is the recommended type for Prometheus write workloads.
#
# Pre-requisite: the aws-ebs-csi-driver add-on must be installed on the
# EKS cluster before ArgoCD syncs this manifest.
#   aws eks create-addon \
#     --cluster-name <your-cluster> \
#     --addon-name aws-ebs-csi-driver \
#     --service-account-role-arn arn:aws:iam::<account-id>:role/AmazonEKS_EBS_CSI_DriverRole
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3-ebs-csi
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer   # volume is created in the same AZ as the pod
reclaimPolicy: Retain                     # keep the EBS volume if the PVC is deleted
allowVolumeExpansion: true                # allows resizing the PVC later without downtime
parameters:
  type: gp3
  iops: "3000"
  throughput: "125"
  encrypted: "true"
