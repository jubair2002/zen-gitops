image:
  repository: fluent/fluent-bit
  tag: latest
  pullPolicy: Always

namespace: dev

fluentbit:
  flush: 5
  logLevel: info
  memBufLimit: 50MB
  db: /var/lib/fluent-bit/flb_kube.db
  filterNamespace: dev

elasticsearch:
  host: my-elasticsearch-project-be5821.es.us-central1.gcp.elastic.cloud
  port: 443
  tls: true
  credentialsSecret: fluent-bit-elastic-credentials

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
